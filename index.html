<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دستیار هوشمند جمنای</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; display: flex; flex-direction: column; height: 100vh; }
        .header { background-color: #2b5a8f; color: white; padding: 15px; text-align: center; font-size: 16px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .chat-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
        .bot-message { background-color: white; color: #333; align-self: flex-start; border-top-right-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .user-message { background-color: #4a76a8; color: white; align-self: flex-end; border-top-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .system-message { background-color: #e2e8f0; color: #4a5568; align-self: center; font-size: 12px; border-radius: 10px; }
        .input-area { background-color: white; padding: 10px; display: flex; gap: 8px; border-top: 1px solid #e1e5eb; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; font-size: 14px; }
        .input-area button { background-color: #4a76a8; color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .input-area button:disabled { background-color: #a0aec0; }
    </style>
</head>
<body>

    <div class="header">دستیار هوشمند جمنای (Gemini) در ایتا</div>
    <div class="chat-container" id="chatContainer">
        <div class="message bot-message">سلام! من هوش مصنوعی جمنای هستم. چه کمکی می‌توانم به شما کنم؟</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="سوال خود را بنویسید..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="sendMessage()">ارسال</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (text === '') return;

            appendMessage(text, 'user-message');
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            const loadingDiv = appendMessage('در حال پردازش...', 'bot-message system-message');

            try {
                // اتصال به پراکسی معتبر و بدون فیلتر مدل Gemini-Pro گوگل
                const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://nexra.aryahcr.cc/api/chat/completions'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'gemini',
                        messages: [{ role: 'user', content: text }]
                    })
                });
                
                // حل مشکل CORS مرورگرها با ساختار AllOrigins
                const rawData = await response.json();
                const data = JSON.parse(rawData.contents);
                
                loadingDiv.remove();

                if (data && data.choices && data.choices[0].message.content) {
                    appendMessage(data.choices[0].message.content, 'bot-message');
                } else {
                    appendMessage('پاسخی دریافت نشد. دوباره تلاش کنید.', 'bot-message');
                }
            } catch (error) {
                loadingDiv.remove();
                appendMessage('خطا در ارتباط با سرور هوش مصنوعی.', 'bot-message');
                console.error(error);
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        function appendMessage(text, className) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            messageDiv.innerText = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return messageDiv;
        }

        function handleKeyPress(event) { if (event.key === 'Enter') sendMessage(); }
    </script>
</body>
</html>
